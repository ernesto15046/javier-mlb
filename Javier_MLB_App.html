<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0E1A;--card:#141929;--card2:#1A2035;
  --blue:#1565C0;--gold:#FFB300;--gold2:#FFC933;
  --green:#4CAF50;--red:#EF5350;--orange:#FF9800;
  --text:#FFFFFF;--muted:#8899BB;--border:#1E2D4A;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-width:860px;width:100%;margin:0 auto;position:relative}

/* UPDATE BANNER */
#update-banner{display:none;background:linear-gradient(135deg,#1B5E20,#2E7D32);padding:10px 16px;text-align:center;flex-shrink:0;cursor:pointer;animation:pulse-green 2s infinite}
#update-banner.visible{display:flex;align-items:center;justify-content:center;gap:8px}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 rgba(76,175,80,0.4)}50%{box-shadow:0 0 0 8px rgba(76,175,80,0)}}
#update-banner .upd-txt{font-size:12px;font-weight:700;color:#fff}
#update-banner .upd-btn{background:#fff;color:#1B5E20;font-size:11px;font-weight:800;padding:4px 10px;border-radius:10px;border:none;cursor:pointer}

/* HEADER */
#header{background:linear-gradient(135deg,#0D1B3E,#1565C0);padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,0.4)}
#header h1{font-size:17px;font-weight:700;letter-spacing:0.5px}
#header .badge{background:var(--gold);color:#000;font-size:11px;font-weight:700;padding:3px 8px;border-radius:12px}
.week-info{font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px}

/* CONTENT AREA */
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.tab-panel{display:none;padding:16px 20px}
.tab-panel.active{display:block}

/* BOTTOM NAV */
#nav{background:#0D1421;border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#nav::-webkit-scrollbar{display:none}
.nav-btn{flex:0 0 auto;min-width:50px;display:flex;flex-direction:column;align-items:center;padding:5px 4px 4px;cursor:pointer;color:var(--muted);transition:color 0.2s;border:none;background:none}
.nav-btn.active{color:var(--gold)}
.nav-btn .ico{font-size:16px;line-height:1}
.nav-btn .lbl{font-size:7px;margin-top:2px;font-weight:500;white-space:nowrap}
/* ─── RUTA MLB CSS ─── */
.ruta-hero{background:linear-gradient(135deg,#0D1B3E,#1A0A2E,#1B3A1A);border-radius:16px;padding:18px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden}
.ruta-hero::before{content:'⚾';position:absolute;font-size:120px;opacity:0.05;right:-10px;top:-20px}
.year-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid var(--border);position:relative;overflow:hidden}
.year-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:5px 0 0 5px}
.year-card.y1::before{background:linear-gradient(180deg,#1565C0,#0D47A1)}
.year-card.y2::before{background:linear-gradient(180deg,#6A1B9A,#4A148C)}
.year-card.y3::before{background:linear-gradient(180deg,#E65100,#BF360C)}
.year-card.y4::before{background:linear-gradient(180deg,#FFB300,#FF6F00)}
.year-card.y5::before{background:linear-gradient(180deg,#2E7D32,#1B5E20)}
.year-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.year-age-badge{padding:4px 12px;border-radius:20px;font-size:13px;font-weight:900;flex-shrink:0}
.year-title{font-size:15px;font-weight:800}
.year-subtitle{font-size:11px;color:var(--muted);margin-top:2px}
.milestone-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);align-items:flex-start}
.milestone-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center}
.milestone-text{font-size:12px;color:var(--text);flex:1;line-height:1.4}
.milestone-target{font-size:11px;color:var(--gold);font-weight:700;flex-shrink:0;text-align:right}
.benchmark-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.bench-item{background:rgba(255,255,255,0.04);border-radius:8px;padding:7px 10px;text-align:center}
.bench-val{font-size:16px;font-weight:900;color:var(--gold)}
.bench-label{font-size:10px;color:var(--muted);margin-top:2px}
.timeline-bar{background:var(--card2);border-radius:12px;padding:12px;margin-bottom:8px}
.timeline-track{position:relative;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin:8px 0}
.timeline-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#1565C0,#FFB300);transition:width 0.5s ease}
.showcase-card{background:linear-gradient(135deg,rgba(255,179,0,0.1),rgba(21,101,192,0.1));border:1px solid rgba(255,179,0,0.3);border-radius:12px;padding:12px;margin-bottom:8px}
/* ─── MENTAL CSS ─── */
.mental-hero{background:linear-gradient(135deg,#0D1B3E,#1A1A2E,#0D2137);border-radius:16px;padding:18px;margin-bottom:14px;text-align:center}
.readiness-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.readiness-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.readiness-label{font-size:13px;font-weight:600;width:90px;flex-shrink:0}
.readiness-slider{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:rgba(255,255,255,0.1);outline:none}
.readiness-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 0 6px rgba(255,179,0,0.5)}
.readiness-val{font-size:16px;font-weight:900;color:var(--gold);width:28px;text-align:center;flex-shrink:0}
.protocol-card{background:var(--card2);border-radius:12px;padding:12px;margin-bottom:8px;border-left:4px solid}
.protocol-step{display:flex;gap:10px;padding:5px 0;align-items:flex-start}
.protocol-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.protocol-text{font-size:12px;color:var(--text);flex:1;line-height:1.5}
.mental-tool-card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.mental-tool-icon{font-size:26px;flex-shrink:0}
.mental-tool-name{font-size:14px;font-weight:800;margin-bottom:3px}
.mental-tool-desc{font-size:11px;color:var(--muted);line-height:1.5}
.quote-card{background:linear-gradient(135deg,rgba(21,101,192,0.12),rgba(106,27,154,0.12));border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px;margin-bottom:8px;text-align:center}
.quote-text{font-size:14px;font-style:italic;color:var(--text);line-height:1.6;margin-bottom:6px}
.quote-author{font-size:11px;color:var(--muted)}
.mindset-check{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.mindset-ico{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.mindset-txt{font-size:12px;color:var(--text);flex:1;line-height:1.4}
.ready-score-display{font-size:48px;font-weight:900;text-align:center;line-height:1}
.ready-label{font-size:13px;text-align:center;margin-top:4px;font-weight:600}
/* ─── SUPLEMENTOS TAB CSS ─── */
.supp-hero{background:linear-gradient(135deg,#0D2137,#1A3A1A,#1B4F72);border-radius:16px;padding:18px;margin-bottom:14px;text-align:center}
.supp-calc-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:14px;border:1px solid var(--border)}
.supp-calc-input{background:var(--card2);border:1px solid var(--border);color:#fff;border-radius:10px;padding:8px 14px;font-size:22px;font-weight:900;text-align:center;width:100%;box-sizing:border-box;margin-top:8px}
.supp-priority-header{border-radius:10px;padding:8px 14px;margin:12px 0 8px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px}
.supp-card{background:var(--card2);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;flex-direction:column;gap:7px;position:relative;overflow:hidden}
.supp-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.supp-card.p1::before{background:var(--blue)}
.supp-card.p2::before{background:var(--orange)}
.supp-card.p3::before{background:var(--green)}
.supp-card.pno::before{background:var(--red)}
.supp-card-top{display:flex;align-items:flex-start;gap:10px}
.supp-icon{font-size:24px;flex-shrink:0;line-height:1}
.supp-name{font-size:14px;font-weight:800;flex:1;line-height:1.3}
.supp-priority-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;flex-shrink:0;text-transform:uppercase;letter-spacing:0.5px}
.supp-dose-box{background:rgba(21,101,192,0.15);border-radius:8px;padding:8px 10px;border:1px solid rgba(21,101,192,0.2)}
.supp-dose-val{font-size:18px;font-weight:900;color:var(--gold);line-height:1.2}
.supp-dose-formula{font-size:10px;color:var(--muted);margin-top:2px}
.supp-timing-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.supp-chip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;background:rgba(255,255,255,0.07);color:var(--muted)}
.supp-chip.time{background:rgba(255,179,0,0.12);color:var(--gold)}
.supp-chip.freq{background:rgba(76,175,80,0.12);color:#81C784}
.supp-chip.form{background:rgba(21,101,192,0.12);color:#90CAF9}
.supp-why{font-size:11px;color:var(--muted);line-height:1.5;font-style:italic}
.supp-brand{font-size:10px;color:#5C7EA8;margin-top:2px}
.supp-safe-ok{font-size:10px;color:var(--green);font-weight:600}
.supp-safe-no{font-size:10px;color:var(--red);font-weight:700}
.supp-check-btn{background:none;border:2px solid var(--muted);border-radius:8px;width:28px;height:28px;color:var(--muted);font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.supp-check-btn.taken{background:var(--green);border-color:var(--green);color:#fff}
.supp-tracker-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:14px;border:1px solid var(--border)}
.supp-timeline{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.supp-time-row{display:flex;gap:10px;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.supp-time-label{font-size:11px;font-weight:700;color:var(--gold);width:80px;flex-shrink:0;padding-top:2px}
.supp-time-items{font-size:11px;color:var(--text);line-height:1.6;flex:1}

/* CARDS */
.card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.card-title{font-size:13px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px}
.section-title{font-size:16px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}

/* TODAY TAB */
.day-header{background:linear-gradient(135deg,var(--blue),#0D47A1);border-radius:14px;padding:16px;margin-bottom:12px;text-align:center}
.day-header .day-name{font-size:22px;font-weight:800;color:var(--gold)}
.day-header .day-focus{font-size:13px;color:rgba(255,255,255,0.8);margin-top:4px}
.day-header .week-badge{display:inline-block;background:rgba(255,179,0,0.2);color:var(--gold);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:6px}

.ex-card{background:var(--card2);border-radius:12px;padding:12px;margin-bottom:8px;border-left:3px solid var(--blue);display:flex;flex-direction:column;gap:6px}
.ex-card.done{border-left-color:var(--green);opacity:0.88;background:rgba(76,175,80,0.05)}
.ex-card.done .ex-name{text-decoration:line-through;color:var(--muted)}
.swing-ex-card.done{border-left-color:var(--green);opacity:0.88;background:rgba(76,175,80,0.05)}
.swing-ex-card.done .ex-name{text-decoration:line-through;color:var(--muted)}
.arm-ex-card.done{border-left-color:var(--green) !important;opacity:0.88;background:rgba(76,175,80,0.05)}
.arm-ex-card.done .ex-name{text-decoration:line-through;color:var(--muted)}
.ex-top{display:flex;align-items:flex-start;gap:10px}
.ex-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--muted);background:none;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s}
.ex-check.checked{background:var(--green);border-color:var(--green);color:#fff;cursor:default}
.ex-undo-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--muted);font-size:10px;padding:2px 8px;border-radius:8px;cursor:pointer;flex-shrink:0;line-height:1.8;transition:all 0.15s}
.ex-undo-btn:hover{background:rgba(239,83,80,0.15);color:#EF9A9A;border-color:rgba(239,83,80,0.3)}
.ex-cnt-wrap{background:var(--card2);border-radius:10px;padding:10px 14px;margin-bottom:8px}
.ex-cnt-bar-bg{height:7px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;margin-top:6px}
.ex-cnt-bar-fill{height:100%;border-radius:4px;transition:width 0.4s ease}
.ex-name{font-size:14px;font-weight:700;flex:1;line-height:1.3}
.ex-meta{display:flex;gap:8px;flex-wrap:wrap;margin-left:32px}
.pill{background:rgba(21,101,192,0.3);color:#90CAF9;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.pill.gold{background:rgba(255,179,0,0.15);color:var(--gold)}
.pill.green{background:rgba(76,175,80,0.2);color:#81C784}
.ex-note{font-size:12px;color:var(--muted);margin-left:32px;font-style:italic}
.yt-btn{display:inline-flex;align-items:center;gap:5px;background:rgba(255,0,0,0.12);color:#FF5252;font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;text-decoration:none;margin-left:32px;margin-top:2px;border:1px solid rgba(255,0,0,0.2)}
.yt-btn:hover{background:rgba(255,0,0,0.25)}

.phase-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:8px}
.phase-t1{background:rgba(21,101,192,0.3);color:#90CAF9}
.phase-t2{background:rgba(156,39,176,0.3);color:#CE93D8}
.phase-t3{background:rgba(255,87,34,0.3);color:#FFAB91}
.deload-banner{background:rgba(76,175,80,0.15);border:1px solid rgba(76,175,80,0.3);border-radius:12px;padding:14px;text-align:center;margin-bottom:12px}
.eval-banner{background:rgba(255,179,0,0.1);border:1px solid rgba(255,179,0,0.3);border-radius:12px;padding:14px;text-align:center;margin-bottom:12px}
.rest-banner{background:rgba(100,181,246,0.1);border:1px solid rgba(100,181,246,0.2);border-radius:12px;padding:14px;text-align:center;margin-bottom:12px}

/* PROGRAMA TAB */
.week-selector{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.week-selector select{flex:1;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;-webkit-appearance:none}
.day-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;background:var(--card);color:var(--muted);cursor:pointer;border:1px solid var(--border);white-space:nowrap}
.day-tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* PROGRESO TAB */
.metric-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px}
.metric-tabs::-webkit-scrollbar{display:none}
.metric-tab{flex-shrink:0;padding:6px 12px;border-radius:16px;font-size:11px;font-weight:600;background:var(--card);color:var(--muted);cursor:pointer;border:1px solid var(--border)}
.metric-tab.active{background:var(--gold);color:#000}
.metric-panel{display:none}
.metric-panel.active{display:block}
.prog-table{width:100%;border-collapse:collapse;font-size:12px}
.prog-table th{background:rgba(21,101,192,0.3);padding:7px 8px;text-align:center;font-weight:700;font-size:11px;color:#90CAF9}
.prog-table td{padding:7px 8px;text-align:center;border-bottom:1px solid var(--border)}
.prog-table td:first-child{text-align:left;font-weight:600;color:var(--text)}
.prog-table tr:last-child td{border-bottom:none}
.input-cell{background:rgba(255,255,255,0.05);border-radius:6px;border:1px solid var(--border);color:var(--text);padding:5px;width:70px;text-align:center;font-size:12px}
.target-cell{color:var(--gold);font-weight:700}
.save-btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
.save-btn:active{opacity:0.8}

/* CATCHER TAB */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-box{background:var(--card);border-radius:14px;padding:14px;text-align:center;border:1px solid var(--border)}
.stat-val{font-size:28px;font-weight:800;color:var(--gold)}
.stat-val.good{color:var(--green)}
.stat-val.ok{color:var(--orange)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:4px;font-weight:600}
.stat-target{font-size:10px;color:var(--muted);margin-top:2px}
.quick-form{display:grid;gap:10px}
.form-row{display:flex;gap:10px;align-items:center}
.form-row label{font-size:13px;color:var(--muted);flex:1}
.form-row input{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;width:100px;font-size:14px;text-align:center}
.history-list{list-style:none}

function getCurrentWeek() {
  const now = new Date();
  const diff = Math.floor((now - START_DATE) / (7 * 24 * 3600 * 1000));
  return Math.min(Math.max(diff + 1, 1), 36);
}

function getCurrentDayKey() {
  const d = new Date().getDay(); // 0=Sun,1=Mon,...6=Sat
  return ['domingo','lunes','martes','miercoles','jueves','viernes','sabado'][d];
}

function getPhaseColor(phase) {
  return {T1:'#90CAF9', T2:'#CE93D8', T3:'#FFAB91'}[phase] || '#fff';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function ytUrl(q) {
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(q);
}

function getExUrl(name, ytSearch) {
  const nl = (name || '').toLowerCase();
  // Try curated OTA_DB search terms first (returns YouTube link)
  for (const [key, query] of OTA_DB) {
    if (nl.includes(key.toLowerCase())) {
      return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(query);
    }
  }
  // Fallback: use the yt field search term
  const q = ytSearch || name || '';
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(q);
}

function dateStr(d) {
  return (d || new Date()).toLocaleDateString('es-ES',{weekday:'short',month:'short',day:'numeric'});
}

function showTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (btn) btn.classList.add('active');
  currentTab = tab;
  if (tab === 'semanas' && !semanasInit) initSemanas();
  if (tab === 'progreso' && !progresoInit) initProgreso();
  if (tab === 'catcher') renderCatcher();
  if (tab === 'nutri') renderNutri();
  if (tab === 'speed') renderSpeed();
  if (tab === 'bateo') renderBateo();
  if (tab === 'brazo') renderBrazo();
  if (tab === 'suplementos') renderSuplementos();
  if (tab === 'ruta') renderRuta();
  if (tab === 'mental') renderMental();
}

  const total = _hoyExTotal;
  const pct = total > 0 ? Math.round(doneCount / total * 100) : 0;
  const cColor = (doneCount === total && total > 0) ? 'var(--green)' : doneCount > 0 ? 'var(--gold)' : 'var(--muted)';
  const bColor = (doneCount === total && total > 0) ? 'var(--green)' : doneCount > 0 ? 'var(--gold)' : '#1565C0';
  const badge = document.getElementById('ex-counter-badge');
  const fill  = document.getElementById('ex-counter-fill');
  const celeb = document.getElementById('ex-counter-celebrate');
  if (badge) { badge.textContent = doneCount + '/' + total; badge.style.color = cColor; }
  if (fill)  { fill.style.width = pct + '%'; fill.style.background = bColor; }
  if (celeb) celeb.style.display = (doneCount === total && total > 0) ? 'block' : 'none';
}

window.toggleEx = function(i, id) {
  const today = new Date();
  const saved = ls.get('done_' + today.toDateString(), {});
  if (saved[id]) return; // ya completado — bloqueado
  saved[id] = true;
  ls.set('done_' + today.toDateString(), saved);
  const chk  = document.getElementById('chk-'+i);
  const card = document.getElementById('exc-'+i);
  if (chk)  { chk.className = 'ex-check checked'; chk.textContent = '✓'; }
  if (card) {
    card.className = 'ex-card done';
    // Inject undo button into ex-top
    const top = card.querySelector('.ex-top');
    if (top && !top.querySelector('.ex-undo-btn')) {
      const btn = document.createElement('button');
      btn.className = 'ex-undo-btn';
      btn.textContent = '↩';
      btn.onclick = function(){ undoEx(i, id); };
      top.appendChild(btn);
    }
    const nameEl = card.querySelector('.ex-name');
    if (nameEl) nameEl.style.textDecoration = 'line-through';
  }
  updateHoyCounter();
};

function renderCatcher() {
  const history = ls.get('catcher_history', []);
  const last = history[history.length - 1] || {};
  const popAvg = last.pop_avg || '—';
  const popBest = last.pop_best || '—';
  const throwAvg = last.throw_avg || '—';
  const throwMax = last.throw_max || '—';
  const transferTime = last.transfer_time || '—';
  const blockPct = last.block_pct || '—';

  function statColor(val, good, ok, type='lt') {
    if (val === '—') return '';
    const n = parseFloat(val);
    if (type === 'lt') return n <= good ? 'style="color:var(--green)"' : n <= ok ? '' : 'style="color:var(--red)"';
    return n >= good ? 'style="color:var(--green)"' : n >= ok ? '' : 'style="color:var(--red)"';
  }

  let html = `<div class="stat-grid">
    <div class="stat-box"><div class="stat-val" ${statColor(popAvg,2.0,2.15,'lt')}>${popAvg}</div><div class="stat-lbl">Pop Time Prom.</div><div class="stat-target">Meta: &lt; 2.00s</div></div>
    <div class="stat-box"><div class="stat-val" ${statColor(popBest,1.90,2.0,'lt')}>${popBest}</div><div class="stat-lbl">Mejor Pop Time</div><div class="stat-target">Meta: &lt; 1.90s</div></div>
    <div class="stat-box"><div class="stat-val" ${statColor(throwAvg,70,65,'gt')}>${throwAvg}</div><div class="stat-lbl">Vel. Tiro Prom.</div><div class="stat-target">Meta: 70+ mph</div></div>

window.saveCatcher = function() {
  const entry = {
    date: document.getElementById('c-date').value,
    pop_avg: document.getElementById('c-pop-avg').value,
    pop_best: document.getElementById('c-pop-best').value,
    transfer_time: document.getElementById('c-transfer').value,
    throw_avg: document.getElementById('c-throw-avg').value,
    throw_max: document.getElementById('c-throw-max').value,
    block_pct: document.getElementById('c-block').value,
    throws_today: document.getElementById('c-throws').value,
  };
  if (!entry.pop_avg && !entry.throw_avg) { alert('Llena al menos pop time o velocidad de tiro'); return; }
  const history = ls.get('catcher_history', []);
  history.push(entry);
  ls.set('catcher_history', history);
  renderCatcher();
};

// Suma macros de los ítems marcados del día
function calcNutriTotals(dayKey, savedKey) {
  const menu = DAILY_MENUS[dayKey];
  const saved = ls.get(savedKey, {});
  let p=0, c=0, f=0, k=0;
  menu.meals.forEach(meal => {
    meal.items.forEach((item, idx) => {
      if (saved[meal.id+'_'+idx]) {
        const d = NUTRI_DATA[meal.id+'_'+idx];
        if (d) { p+=d[0]; c+=d[1]; f+=d[2]; k+=d[3]; }
      }
    });
  });
  return {p, c, f, k};
}

// Actualiza el card de seguimiento sin re-renderizar todo el tab
function renderNutriTracker(dayKey) {
  const el = document.getElementById('nutri-tracker');
  if (!el) return;
  const menu  = DAILY_MENUS[dayKey];
  const savedKey = 'nutri_' + dayKey + '_' + new Date().toLocaleDateString('es-MX');
  const totals = calcNutriTotals(dayKey, savedKey);
  const waterTarget = menu.type === 'campo' ? 10 : menu.type === 'recovery' ? 8 : 9;
  const waterCount  = ls.get('water_' + new Date().toDateString(), 0);

  const targets = { p: menu.protein, c: menu.carbs, f: menu.fat, k: menu.kcal };

  function bar(val, tgt, color, label, unit, allowOver) {
    const pct  = Math.min(Math.round(val/tgt*100), 100);
    const hit  = val >= tgt;
    const over = allowOver ? '' : (val > tgt*1.1 ? ' ⚠️' : '');
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="font-size:11px;color:var(--muted);width:62px;flex-shrink:0">${label}</div>
      <div style="flex:1;height:10px;background:rgba(255,255,255,0.07);border-radius:6px;overflow:hidden">
        <div style="height:100%;border-radius:6px;background:${hit?'var(--gold)':color};width:${pct}%;transition:width 0.45s ease"></div>
      </div>
      <div style="font-size:11px;font-weight:800;width:78px;text-align:right;color:${hit?'var(--gold)':color}">
        ${val}<span style="font-weight:400;color:var(--muted);font-size:9px">/${tgt}${unit}</span>${hit?'✅':''}${over}
      </div>
    </div>`;
  }

  const wPct = Math.min(Math.round(waterCount/waterTarget*100),100);
  const wHit = waterCount >= waterTarget;
  const pctTotal = Math.round((totals.p/targets.p + totals.c/targets.c + totals.f/targets.f + totals.k/targets.k)/4*100);
  const overall = Math.min(pctTotal, 100);

  el.innerHTML = `<div class="card" style="border-color:rgba(255,179,0,0.4)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="card-title" style="margin-bottom:0">📊 Nutrientes consumidos hoy</div>
      <div style="background:${overall>=80?'rgba(76,175,80,0.2)':overall>=50?'rgba(255,152,0,0.2)':'rgba(255,255,255,0.07)'};
                  color:${overall>=80?'var(--green)':overall>=50?'var(--orange)':'var(--muted)'};
                  font-size:13px;font-weight:900;padding:3px 10px;border-radius:20px">${overall}%</div>
    </div>
    ${bar(totals.p, targets.p, '#90CAF9', '🥩 Proteína', 'g', true)}
    ${bar(totals.c, targets.c, '#FFCC80', '🍞 Carbos',   'g', false)}
    ${bar(totals.f, targets.f, '#CE93D8', '🥑 Grasas',   'g', false)}
    ${bar(totals.k, targets.k, '#FF8A65', '🔥 Calorías', '', false)}
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:0">
      <div style="font-size:11px;color:var(--muted);width:62px;flex-shrink:0">💧 Agua</div>
      <div style="flex:1;height:10px;background:rgba(255,255,255,0.07);border-radius:6px;overflow:hidden">
        <div style="height:100%;border-radius:6px;background:${wHit?'var(--gold)':'#29B6F6'};width:${wPct}%;transition:width 0.45s ease"></div>
      </div>
      <div style="font-size:11px;font-weight:800;width:78px;text-align:right;color:${wHit?'var(--gold)':'#29B6F6'}">
        ${waterCount}<span style="font-weight:400;color:var(--muted);font-size:9px">/${waterTarget} vasos</span>${wHit?'✅':''}
      </div>
    </div>
  </div>`;
}

window.toggleMeal = function(mealId, i, savedKey) {
  const saved = ls.get(savedKey, {});
  const key = mealId + '_' + i;
  saved[key] = !saved[key];
  ls.set(savedKey, saved);
  const done = saved[key];
  const el = document.getElementById('mc-'+mealId+'-'+i);
  if (el) { el.className = 'meal-check' + (done ? ' done' : ''); el.textContent = done ? '✓' : ''; }
  // Actualizar conteo de ítems completados
  const menu = DAILY_MENUS[currentNutriDay];
  const totalItems = menu.meals.reduce((a,m) => a + m.items.length, 0);
  const doneItems  = menu.meals.reduce((a,m) => a + m.items.filter((_,idx) => ls.get(savedKey,{})[m.id+'_'+idx]).length, 0);
  const pctDone = totalItems > 0 ? Math.round(doneItems/totalItems*100) : 0;
  const pctEl = document.querySelector('#nutri-content .meal-pct-text');
  if (pctEl) pctEl.textContent = doneItems+'/'+totalItems+' items';
  // Refrescar tracker de nutrientes en tiempo real
  renderNutriTracker(currentNutriDay);
};

window.toggleSup = function(supId, savedKey) {
  const saved = ls.get(savedKey, {});
  saved['sup_'+supId] = !saved['sup_'+supId];
  ls.set(savedKey, saved);
  const done = saved['sup_'+supId];
  const el = document.getElementById('sup-'+supId);
  if (el) { el.className = 'meal-check' + (done ? ' done' : ''); el.textContent = done ? '✓' : ''; }
};

window.addWater = function(n) {
  const todayKey = new Date().toDateString();
  const menu = DAILY_MENUS[currentNutriDay];
  const waterTarget = menu.type === 'campo' ? 10 : menu.type === 'recovery' ? 8 : 9;
  let w = ls.get('water_' + todayKey, 0);
  w = Math.max(0, Math.min(12, w + n));
  ls.set('water_' + todayKey, w);
  // Actualizar barra de hidratación inline
  const fill = document.getElementById('hydro-fill');
  if (fill) fill.style.width = Math.min(w/waterTarget*100,100) + '%';
  const countEl = document.querySelector('.hydro-count');
  if (countEl) countEl.textContent = w + '/' + waterTarget + ' vasos';
  // Actualizar tracker de nutrientes (incluye agua)
  renderNutriTracker(currentNutriDay);
};

function saveSpeedTime() {
  const inp = document.getElementById('speed-time-inp');
  const val = parseFloat(inp.value);
  if (!val || val < 5 || val > 20) { alert('Tiempo inválido (entre 5 y 20 segundos)'); return; }
  const history = ls.get('speed_60yd_history', []);
  history.push({ date: new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'2-digit'}), time: val });
  ls.set('speed_60yd_history', history);
  inp.value = '';
  renderSpeed();
}

function saveSwingSession() {
  const iems = parseFloat(document.getElementById('sw-iems').value) || 0;
  const batspeed = parseFloat(document.getElementById('sw-batspeed').value) || 0;
  const notes = document.getElementById('sw-notes').value || '';
  if (!iems && !batspeed) return;
  const history = ls.get('swing_history', []);
  history.push({ date: dateStr(new Date()), iems, batspeed, notes });
  ls.set('swing_history', history);
  document.getElementById('sw-iems').value = '';
  document.getElementById('sw-batspeed').value = '';
  document.getElementById('sw-notes').value = '';
  renderBateo();
}
window.saveSwingSession = saveSwingSession;

window.saveBatStats = function() {

    avg_exit_velo: document.getElementById('bat-ev-avg').value,

  renderBateo();
};

// ─── Bateo exercise toggle functions ─────────────────────────────
function updateBateoCounter() {
  const btSavedKey = 'done_bateo_' + new Date().toDateString();
  const btSaved = ls.get(btSavedKey, {});
  const btDone  = Object.values(btSaved).filter(v => v).length;
  const btTotalEl = document.getElementById('bateo-counter-badge');
  if (!btTotalEl) return;
  const btTotal = parseInt(btTotalEl.textContent.split('/')[1]) || 0;
  const btPct   = btTotal > 0 ? Math.round(btDone / btTotal * 100) : 0;
  const cColor  = btDone === btTotal && btTotal > 0 ? 'var(--green)' : btDone > 0 ? 'var(--gold)' : 'var(--muted)';
  const bColor  = btDone === btTotal && btTotal > 0 ? 'var(--green)' : btDone > 0 ? 'var(--gold)' : '#9C27B0';
  btTotalEl.textContent = btDone + '/' + btTotal;
  btTotalEl.style.color = cColor;
  const fill = document.getElementById('bateo-counter-fill');
  if (fill) { fill.style.width = btPct + '%'; fill.style.background = bColor; }
  const celeb = document.getElementById('bateo-counter-celebrate');
  if (celeb) celeb.style.display = (btDone === btTotal && btTotal > 0) ? 'block' : 'none';
}

window.toggleBateoEx = function(i, id) {
  const key = 'done_bateo_' + new Date().toDateString();
  const saved = ls.get(key, {});
  if (saved[id]) return; // bloqueado
  saved[id] = true;
  ls.set(key, saved);
  const chk  = document.getElementById('btchk-'+i);
  const card = document.getElementById('btexc-'+i);
  if (chk)  { chk.className = 'ex-check checked'; chk.textContent = '✓'; }
  if (card) {
    card.className = 'swing-ex-card done';
    const top = card.querySelector('.ex-top');
    if (top && !top.querySelector('.ex-undo-btn')) {
      const btn = document.createElement('button');
      btn.className = 'ex-undo-btn';
      btn.textContent = '↩';
      btn.onclick = function(){ undoBateoEx(i, id); };
      top.appendChild(btn);
    }
    const nameEl = card.querySelector('.ex-name');
    if (nameEl) nameEl.style.textDecoration = 'line-through';
  }
  updateBateoCounter();
};

window.undoBateoEx = function(i, id) {
  const key = 'done_bateo_' + new Date().toDateString();
  const saved = ls.get(key, {});
  saved[id] = false;
  ls.set(key, saved);
  const chk  = document.getElementById('btchk-'+i);
  const card = document.getElementById('btexc-'+i);
  if (chk)  { chk.className = 'ex-check'; chk.textContent = ''; }
  if (card) {
    card.className = 'swing-ex-card';
    const ub = card.querySelector('.ex-undo-btn');
    if (ub) ub.remove();
    const nameEl = card.querySelector('.ex-name');
    if (nameEl) nameEl.style.textDecoration = '';
  }
  updateBateoCounter();
};

  // PROGRAMA DE TIRO ACTIVO
  const tp = THROWING_PROGRAM[throwPhase];

    history.slice().reverse().slice(0,10).forEach(h => {

  // CARGA SEMANAL DE TIROS
  const today2 = new Date();

  for (let d = 0; d < 7; d++) {
    const dt = new Date(today2); dt.setDate(today2.getDate() - d);

  html += `<div class="card" style="border-color:${weeklyThrows>180?'rgba(239,83,80,0.4)':weeklyThrows>120?'rgba(255,179,0,0.3)':'var(--border)'}">

    <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px">
      <div style="text-align:center">

        <div style="height:10px;background:rgba(255,255,255,0.08);border-radius:5px;overflow:hidden">

    </div>

    <div style="margin-top:10px">
      <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:6px">Guía de carga semanal para catcher (12-16 años):</div>
      ${[['0-120','Zona verde','Carga óptima. Máximo desarrollo sin riesgo.','var(--green)'],['120-180','Zona amarilla','Monitorear. Reducir intensidad del próximo día de tiro.','var(--gold)'],['180+','Zona roja','Sobreuso. Riesgo elevado de lesión UCL. Descanso obligatorio 2+ días.','var(--red)']].map(([r,l,d,c])=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
        <div style="width:70px;font-size:11px;font-weight:800;color:${c}">${r}</div>
        <div style="flex:1"><div style="font-size:11px;font-weight:700;color:${c}">${l}</div><div style="font-size:10px;color:var(--muted)">${d}</div></div>

  // J-BAND PROTOCOL
  html += `<div class="card">

    <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Realizar TODOS LOS DÍAS que Javier lanza. Antes de tirar (activación) y después de tirar (recuperación).</div>
    <div style="margin-bottom:8px">
      <div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:6px">⬆️ PRE-LANZAMIENTO (Activación — 5-7 min)</div>
      ${[
        'Arm Circles small → large (10 fwd/bwd)',
        'Shoulder Stretch 90/90 (cada lado, 30 seg)',
        'Arm Action con J-Band — External Rotation × 15',
        'Arm Action con J-Band — Internal Rotation × 15',
        'Elbow Flexion/Extension bajo resistencia × 15',
        'Band Pull-Aparts × 20',
        'Wrist circles + pronation/supination (1 min)',
      ].map(s=>`<div style="display:flex;gap:8px;padding:4px 0;font-size:12px"><span style="color:var(--green)">▸</span><span>${s}</span></div>`).join('')}
    </div>

      <div style="font-size:12px;font-weight:700;color:#64B5F6;margin-bottom:6px">⬇️ POST-LANZAMIENTO (Recuperación — 8-10 min)</div>

// ─── Arm exercise toggle functions ───────────────────────────────
function updateArmCounter() {
  const key = 'done_arm_' + new Date().toDateString();
  const saved = ls.get(key, {});
  const doneCount = Object.values(saved).filter(v => v).length;
  const badge = document.getElementById('arm-counter-badge');
  if (!badge) return;
  const total = parseInt(badge.textContent.split('/')[1]) || 0;
  const pct = total > 0 ? Math.round(doneCount / total * 100) : 0;
  const cColor = doneCount === total && total > 0 ? 'var(--green)' : doneCount > 0 ? 'var(--gold)' : 'var(--muted)';
  const bColor = doneCount === total && total > 0 ? 'var(--green)' : doneCount > 0 ? 'var(--gold)' : '#2E86C1';
  badge.textContent = doneCount + '/' + total;
  badge.style.color = cColor;
  const fill = document.getElementById('arm-counter-fill');
  if (fill) { fill.style.width = pct + '%'; fill.style.background = bColor; }
  const celeb = document.getElementById('arm-counter-celebrate');
  if (celeb) celeb.style.display = (doneCount === total && total > 0) ? 'block' : 'none';
}

window.toggleArmEx = function(gIdx, id) {
  const key = 'done_arm_' + new Date().toDateString();
  const saved = ls.get(key, {});
  if (saved[id]) return; // bloqueado
  saved[id] = true;
  ls.set(key, saved);
  const chk  = document.getElementById('armchk-'+gIdx);
  const card = document.getElementById('armexc-'+gIdx);
  if (chk)  { chk.className = 'ex-check checked'; chk.textContent = '✓'; }
  if (card) {
    card.classList.add('done');
    card.style.borderLeftColor = 'var(--green)';
    const top = card.querySelector('.ex-top');
    if (top && !top.querySelector('.ex-undo-btn')) {
      const btn = document.createElement('button');
      btn.className = 'ex-undo-btn';
      btn.textContent = '↩';
      btn.onclick = function(){ undoArmEx(gIdx, id); };
      top.appendChild(btn);
    }
    const nameEl = card.querySelector('.ex-name');
    if (nameEl) nameEl.style.textDecoration = 'line-through';
  }
  updateArmCounter();
};

window.undoArmEx = function(gIdx, id) {
  const key = 'done_arm_' + new Date().toDateString();
  const saved = ls.get(key, {});
  saved[id] = false;
  ls.set(key, saved);
  const chk  = document.getElementById('armchk-'+gIdx);
  const card = document.getElementById('armexc-'+gIdx);
  if (chk)  { chk.className = 'ex-check'; chk.textContent = ''; }
  if (card) {
    card.classList.remove('done');
    card.style.borderLeftColor = '';
    const ub = card.querySelector('.ex-undo-btn');
    if (ub) ub.remove();
    const nameEl = card.querySelector('.ex-name');
    if (nameEl) nameEl.style.textDecoration = '';
  }
  updateArmCounter();
};

window.setArmHealth = function(val) {
  ls.set('arm_health', val);
  renderBrazo();
};

window.updateThrowCount = function(delta) {
  const THROW_LIMIT = 50;
  const today = new Date();
  const key = 'arm_throw_count_' + today.toDateString();
  const current = ls.get(key, 0);
  const next = Math.max(0, current + delta);
  ls.set(key, next);

  // Log exceedance when crossing the limit
  if (delta > 0 && next > THROW_LIMIT) {
    const excLog = ls.get('throw_exceedances', []);
    const timeStr = today.toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'});
    const already = excLog.some(e => e.date === today.toDateString() && e.count === next);
    if (!already) {
      excLog.push({ date: today.toDateString(), time: timeStr, count: next, over: next - THROW_LIMIT });
      ls.set('throw_exceedances', excLog);
    }
  }

  // Compute new states
  const throwPct  = Math.min(next / THROW_LIMIT * 100, 100);
  const throwOver = Math.max(0, next - THROW_LIMIT);
  const barColor  = next > THROW_LIMIT ? 'var(--red)' : next >= 40 ? 'var(--orange)' : next >= 25 ? 'var(--gold)' : 'var(--green)';
  const numColor  = next > THROW_LIMIT ? 'var(--red)' : next >= 40 ? 'var(--orange)' : 'var(--gold)';
  const stColor   = next > THROW_LIMIT ? 'var(--red)' : next >= 40 ? 'var(--orange)' : 'var(--green)';
  const stText    = next > THROW_LIMIT ? `⛔ LÍMITE SUPERADO (+${throwOver})` : next >= 40 ? '⚠️ Acercándose al límite' : next >= 25 ? '🟡 Zona de atención' : '✅ Dentro del rango';
  const remaining = THROW_LIMIT - next;

  // Update DOM
  const numEl   = document.getElementById('throw-count-display');
  const barEl   = document.getElementById('throw-bar-fill');
  const statEl  = document.getElementById('throw-status-text');
  const bannerEl = document.getElementById('throw-exceeded-banner');

  if (numEl)  { numEl.textContent = next; numEl.style.color = numColor; }
  if (barEl)  { barEl.style.width = throwPct + '%'; barEl.style.background = barColor; }
  if (statEl) { statEl.textContent = stText; statEl.style.color = stColor; }
  if (bannerEl) bannerEl.style.display = next > THROW_LIMIT ? 'block' : 'none';

  // Update remaining count (find it by text content pattern)
  const remEls = document.querySelectorAll('#throw-counter-card span');
  remEls.forEach(el => {
    if (el.textContent.includes('restantes') || el.textContent.includes('Límite superado')) {
      if (remaining > 0) {
        el.style.color = '#81C784';
        el.textContent = remaining + ' restantes';
      } else {
        el.style.color = 'var(--red)';
        el.textContent = 'Límite superado';
      }
    }
  });

  // Refresh exceedance log if today has new entries
  const todayExcLog = ls.get('throw_exceedances', []).filter(e => e.date === today.toDateString());
  let logContainer = document.querySelector('#throw-counter-card [data-exclog]');
  if (!logContainer && todayExcLog.length > 0) {
    // Create and append the exceedance log section
    const card = document.getElementById('throw-counter-card');
    if (card) {
      const div = document.createElement('div');
      div.setAttribute('data-exclog', '1');
      div.style.cssText = 'margin-top:10px;background:rgba(239,83,80,0.06);border-radius:8px;padding:8px 10px;border:1px solid rgba(239,83,80,0.15)';
      div.innerHTML = `<div style="font-size:10px;font-weight:700;color:#EF9A9A;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px">📋 Excedencias registradas hoy</div>` +
        todayExcLog.map(e => `<div style="font-size:10px;color:var(--muted);padding:2px 0">⏰ ${e.time} — Lanzamiento #${e.count} (límite superado en +${e.over})</div>`).join('');
      card.appendChild(div);
    }
  } else if (logContainer) {
    logContainer.innerHTML = `<div style="font-size:10px;font-weight:700;color:#EF9A9A;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px">📋 Excedencias registradas hoy</div>` +
      todayExcLog.map(e => `<div style="font-size:10px;color:var(--muted);padding:2px 0">⏰ ${e.time} — Lanzamiento #${e.count} (límite superado en +${e.over})</div>`).join('');
  }
};

window.saveArmSession = function() {
  const vel  = document.getElementById('arm-vel')?.value;
  const pop  = document.getElementById('arm-pop')?.value;
  const throws = document.getElementById('arm-throws')?.value;
  const notes = document.getElementById('arm-notes')?.value;
  if (!vel && !pop) { alert('Ingresa al menos la velocidad o el pop time.'); return; }
  const history = ls.get('arm_history', []);
  history.push({
    date: new Date().toLocaleDateString('es-MX'),
    vel: vel || null,
    pop: pop || null,
    throws: throws || null,
    notes: notes || ''
  });
  ls.set('arm_history', history);
  if (vel) ls.set('arm_last_vel', vel);
  if (throws) ls.set('arm_throw_count_' + new Date().toDateString(), parseInt(throws)||0);
  alert('✅ Sesión de brazo guardada');
  renderBrazo();
};

window.toggleSupp = function(id) {
  const today = new Date().toDateString();
  const suppDone = ls.get('supp_done_' + today, {});
  suppDone[id] = !suppDone[id];
  ls.set('supp_done_' + today, suppDone);

  const trackers = SUPPLEMENTS.filter(s => s.tracker);
  const doneCount = trackers.filter(s => suppDone[s.id]).length;
  const totalTrack = trackers.length;
  const pct = totalTrack > 0 ? Math.round(doneCount / totalTrack * 100) : 0;
  const cColor = doneCount === totalTrack ? 'var(--green)' : doneCount > 0 ? 'var(--gold)' : 'var(--muted)';
  const bColor = doneCount === totalTrack ? 'var(--green)' : doneCount > 0 ? 'var(--gold)' : '#1565C0';

  // Update counter
  const badge = document.getElementById('supp-counter-badge');
  const fill  = document.getElementById('supp-counter-fill');
  if (badge) { badge.textContent = doneCount + '/' + totalTrack; badge.style.color = cColor; }
  if (fill)  { fill.style.width = pct + '%'; fill.style.background = bColor; }

  // Update card checkbutton
  const cardBtn = document.querySelector(`.supp-check-btn[onclick="toggleSupp('${id}')"]`);
  if (cardBtn) {
    cardBtn.className = 'supp-check-btn' + (suppDone[id] ? ' taken' : '');
    cardBtn.textContent = suppDone[id] ? '✓' : '';
  }
  // Update tracker chip
  const chip = document.getElementById('strk-' + id);
  if (chip) {
    const taken = !!suppDone[id];
    chip.style.background = taken ? 'rgba(76,175,80,0.15)' : 'rgba(255,255,255,0.04)';
    chip.style.borderColor = taken ? 'rgba(76,175,80,0.4)' : 'var(--border)';
    const chipName = chip.querySelector('span:nth-child(2)');
    const chipCheck = chip.querySelector('span:nth-child(3)');
    if (chipName) chipName.style.color = taken ? 'var(--green)' : 'var(--muted)';
    if (chipCheck) { chipCheck.textContent = taken ? '✓' : '○'; chipCheck.style.color = taken ? 'var(--green)' : 'var(--border)'; }
  }
};

      {key:'energy', label:'Energía ⚡', desc:'Nivel de energía general', lo:'Agotado', hi:'Lleno'},
      {key:'stress', label:'Estrés 😤', desc:'Tensión mental/emocional', lo:'Sin estrés', hi:'Máximo'},
      {key:'soreness', label:'Dolor 🦵', desc:'Dolor muscular/articular', lo:'Sin dolor', hi:'Mucho'},
    ].map(({key, label, desc, lo, hi}) => `
    <div class="readiness-row">
      <div class="readiness-label">${label}</div>
      <div style="flex:1;display:flex;flex-direction:column;gap:2px">
        <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-bottom:2px"><span>${lo}</span><span>${hi}</span></div>
        <input type="range" class="readiness-slider" id="rd-${key}" min="1" max="10" value="${readiness[key]||5}"
          oninput="updateReadiness('${key}', this.value)">
      </div>
      <div class="readiness-val" id="rv-${key}">${readiness[key]||5}</div>
    </div>`).join('')}
    <div style="margin-top:10px;font-size:11px;color:var(--muted);line-height:1.5;padding:8px;background:rgba(255,255,255,0.03);border-radius:8px">
      💡 El readiness score modula el entrenamiento del día. Un score < 5 es señal de que el cuerpo pide recuperación — forzar intensidad alta ese día aumenta el riesgo de lesión en un 40%.
    </div>
  </div>`;

  // Pre-game routine
  html += `<div class="card"><div class="card-title">🎮 Rutina Pre-Juego / Pre-Entrenamiento</div>`;
  PRE_GAME_ROUTINE.forEach(s => {
    html += `<div class="protocol-step">
      <div class="protocol-num" style="background:${s.color}33;color:${s.color}">${s.n}</div>
      <div style="flex:1">
        <div style="font-size:10px;font-weight:700;color:var(--gold)">${s.t}</div>
        <div class="protocol-text">${s.action}</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // Mental tools
  html += `<div class="card"><div class="card-title">🛠️ Herramientas de Alto Rendimiento Mental</div>`;
  MENTAL_TOOLS.forEach(t => {
    html += `<div class="mental-tool-card">
      <div class="mental-tool-icon">${t.ico}</div>
      <div>
        <div class="mental-tool-name">${t.name}</div>
        <div class="mental-tool-desc">${t.desc}</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // Mindset principles
  html += `<div class="card"><div class="card-title">💎 Principios de Mentalidad Ganadora</div>`;
  MINDSET_PRINCIPLES.forEach(p => {
    html += `<div class="mindset-check">
      <span class="mindset-ico">${p.ico}</span>
      <span class="mindset-txt">${p.text}</span>
    </div>`;
  });
  html += `</div>`;

  // Visualization protocol
  html += `<div class="card" style="border-color:rgba(106,27,154,0.4)">
    <div class="card-title" style="color:#CE93D8">📽️ Protocolo de Visualización Diaria (5 min)</div>
    ${[
      ['Posición','Siéntate cómodo, cierra los ojos. Respira 5 veces profundo.'],
      ['Escena','Visualiza el campo en detalle: el olor del pasto, el sonido del estadio, el peso del equipo.'],
      ['Acción','Ve la acción perfecta: el pop time impecable, el swing que cruza la pelota, el primer paso explosivo.'],
      ['Éxito','Siente la emoción del éxito. Deja que el cuerpo sienta el logro en tiempo real.'],
      ['Activación','Abre los ojos. Di tu frase de activación. El cerebro no diferencia entre lo visualizado y lo real a nivel neuromuscular.'],
    ].map(([t,d],i)=>`<div class="protocol-step">
      <div class="protocol-num" style="background:rgba(106,27,154,0.3);color:#CE93D8">${i+1}</div>
      <div><div style="font-size:11px;font-weight:700;color:#CE93D8">${t}</div><div class="protocol-text">${d}</div></div>
    </div>`).join('')}
  </div>`;

  // ── FRASES ANCLA DE ACTIVACIÓN ──────────────────────────────
  const activePhrase = ls.get('active_phrase', '');
  const activePhraseData = ELITE_PHRASES.find(p => p.id === activePhrase) || null;

  html += `<div class="card" style="border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.04)">
    <div class="card-title" style="color:#FFD700">⚡ Frases Ancla de Activación — Elige la Tuya</div>
    <p style="font-size:11px;color:var(--muted);margin:0 0 12px">
      Elige UNA frase. Practícala 30 días antes de cada sesión con el mismo gesto físico (tocar el ala del casco).
      Después de 30 días, el gesto solo activa el estado mental — condicionamiento neurológico real.
    </p>`;

  if (activePhraseData) {
    html += `<div style="background:linear-gradient(135deg,rgba(0,0,0,0.5),rgba(30,30,50,0.8));border:2px solid ${activePhraseData.color};border-radius:14px;padding:16px;text-align:center;margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;color:${activePhraseData.color};letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">🔥 MI FRASE ACTIVA</div>
      <div style="font-size:28px;font-weight:900;color:${activePhraseData.color};letter-spacing:1px;text-shadow:0 0 20px ${activePhraseData.color}44;margin-bottom:6px">${activePhraseData.ico} ${activePhraseData.phrase}</div>
      <div style="font-size:10px;color:var(--muted);font-style:italic">${activePhraseData.usage}</div>
    </div>`;
  }

  ELITE_PHRASES.forEach(p => {
    const isActive = p.id === activePhrase;
    html += `<div onclick="selectPhrase('${p.id}')" style="
      cursor:pointer;
      background:${isActive ? `rgba(0,0,0,0.5);border:2px solid ${p.color}` : 'rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1)'};
      border-radius:12px;padding:12px 14px;margin-bottom:8px;
      transition:all 0.2s;
      ${isActive ? `box-shadow:0 0 16px ${p.color}33` : ''}
    ">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-size:22px;flex-shrink:0">${p.ico}</div>
        <div style="flex:1">
          <div style="font-size:17px;font-weight:800;color:${isActive ? p.color : '#fff'};letter-spacing:0.5px">${p.phrase}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${p.context}</div>
        </div>
        ${isActive ? `<div style="font-size:18px">✅</div>` : `<div style="font-size:13px;color:var(--muted);background:rgba(255,255,255,0.07);border-radius:6px;padding:3px 8px">Elegir</div>`}
      </div>
      ${isActive ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.1);font-size:10px;color:${p.color}">⏱️ Cuándo usarla: ${p.usage}</div>` : ''}
    </div>`;
  });
  html += `</div>`;

  // Quotes — citas de catchers elite
  html += `<div class="card"><div class="card-title">💬 Citas de Catchers y Atletas Elite</div>`;
  QUOTES.forEach(q => {
    html += `<div class="quote-card">
      <div class="quote-text">${q.q}</div>
      <div class="quote-author">${q.a}</div>
    </div>`;
  });
  html += `</div>`;

  // Error recovery
  html += `<div class="card" style="border-color:rgba(76,175,80,0.3)"><div class="card-title" style="color:var(--green)">🔄 Protocolo de Recuperación de Errores</div>
    ${[
      ['0-3 seg','Siente la emoción. No la suprimas. Gritar, frustración = normal.'],
      ['3-10 seg','Reset físico: da un paso atrás, toca la parte posterior del casco o guante (ancla física).'],
      ['10-20 seg','Box breathing: inhala 4, retén 4, exhala 4.'],
      ['20-60 seg','Pregunta del proceso: ¿Qué ajuste necesito? (No ¿Por qué fallé?)'],
      ['60 seg+','Listo. El error ya no existe. Solo existe el siguiente pitcheo / turno al bate.'],
    ].map(([t,d])=>`<div class="protocol-step">
      <div style="flex-shrink:0;font-size:10px;font-weight:700;color:var(--green);width:65px">${t}</div>
      <div class="protocol-text" style="padding-left:8px">${d}</div>
    </div>`).join('')}
  </div>`;

  document.getElementById('mental-content').innerHTML = html;
}

window.selectPhrase = function(id) {
  ls.set('active_phrase', id);
  renderMental();
  // Scroll to top of mental tab so the user sees their active phrase
  const el = document.getElementById('mental-content');
  if (el) el.scrollTop = 0;
};

window.updateReadiness = function(key, val) {
  const today = new Date().toDateString();
  const readiness = ls.get('readiness_' + today, {sleep:5, energy:5, stress:5, soreness:5});
  readiness[key] = parseInt(val);
  ls.set('readiness_' + today, readiness);
  const v = document.getElementById('rv-' + key);
  if (v) v.textContent = val;
  // Recalculate score
  const score = Math.round((readiness.sleep + readiness.energy + (10 - readiness.stress) + (10 - readiness.soreness)) / 4);
  const color = score >= 7 ? 'var(--green)' : score >= 5 ? 'var(--gold)' : 'var(--red)';
  const label = score >= 8 ? '🟢 Listo para Máximo Esfuerzo' : score >= 6 ? '🟡 Entrenamiento Normal' : score >= 4 ? '🟠 Reducir Intensidad' : '🔴 Recuperación Activa Solo';
  const sv = document.getElementById('ready-score-val');
  const sl = document.getElementById('ready-score-label');
  if (sv) { sv.textContent = score; sv.style.color = color; }
  if (sl) { sl.textContent = label; sl.style.color = color; }
};

// =============================================
// SISTEMA DE ACTUALIZACIÓN AUTOMÁTICA
// =============================================
// (APP_VERSION declarado al inicio del script)

// ── Service Worker Registration ──────────────
// El Service Worker (sw.js) debe estar en la misma carpeta que este HTML.
// Cuando el app está alojado en una URL (GitHub Pages, Netlify, etc.),
// el SW detecta nuevas versiones automáticamente.
let deferredSWUpdate = null;

if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        // Verificar actualizaciones cada vez que el app se abre
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // Nueva versión instalada en background → mostrar banner
              deferredSWUpdate = newWorker;
              showUpdateBanner('Nueva versión instalada. Toca para aplicar →');
            }
          });
        });
        // Forzar verificación de actualización al abrir
        if (reg.waiting) {
          deferredSWUpdate = reg.waiting;
          showUpdateBanner('Actualización lista. Toca para reiniciar →');
        }
        reg.update(); // Verifica si hay nueva versión en el servidor
      })
      .catch(err => console.log('SW no disponible:', err));

    // Cuando el SW nuevo toma control → recargar la página
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      window.location.reload();
    });
  });
}

// ── Mostrar banner de actualización (vía Service Worker) ─────────
function showUpdateBanner(msg) {
  const banner = document.getElementById('update-banner');
  const txt = banner.querySelector('.upd-txt');
  if (txt) txt.textContent = msg || '¡Nueva versión disponible!';
  banner.classList.add('visible');
}

// ── Aplicar actualización vía SW ──────────────
window.applyUpdate = function() {
  if (deferredSWUpdate) {
    deferredSWUpdate.postMessage({ type: 'SKIP_WAITING' });
  } else {
    window.location.reload(true);
  }
};

// ══════════════════════════════════════════════
// 💾 GUARDAR DATOS — exporta todo a un archivo JSON
// ══════════════════════════════════════════════
window.exportarDatos = function() {
  const datos = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('javier_')) {
      datos[key] = localStorage.getItem(key);
    }
  }
  const cantidad = Object.keys(datos).length;
  if (cantidad === 0) {
    alert('⚠️ No hay datos guardados todavía. Usa la app un poco antes de exportar.');
    return;
  }
  const contenido = JSON.stringify({ version: APP_VERSION, fecha: new Date().toISOString(), datos }, null, 2);
  const blob = new Blob([contenido], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'javier_datos_backup.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setTimeout(() => {
    alert('✅ Datos guardados (' + cantidad + ' registros).\n\nEl archivo "javier_datos_backup.json" fue descargado.\n\nGuárdalo en un lugar seguro — lo necesitarás al abrir la nueva versión.');
  }, 400);
};

// ══════════════════════════════════════════════
// 📲 RESTAURAR DATOS — importa desde el JSON guardado
// ══════════════════════════════════════════════
window.importarDatos = function(input) {
  const archivo = input.files[0];
  if (!archivo) return;
  const lector = new FileReader();
  lector.onload = function(e) {
    try {
      const { datos, version, fecha } = JSON.parse(e.target.result);
      if (!datos || typeof datos !== 'object') throw new Error('Formato inválido');
      let count = 0;
      for (const [key, val] of Object.entries(datos)) {
        if (key.startsWith('javier_')) {
          localStorage.setItem(key, val);
          count++;
        }
      }
      alert('✅ ¡' + count + ' datos restaurados!\n\nBackup de la versión ' + (version || '?') + '\nFecha: ' + (fecha ? fecha.slice(0,10) : '?') + '\n\nEl app se va a recargar ahora con todos tus datos.');
      setTimeout(() => window.location.reload(), 800);
    } catch(err) {
      alert('❌ Error al importar.\n\nAsegúrate de seleccionar el archivo "javier_datos_backup.json" que guardaste antes.');
    }
  };
  lector.readAsText(archivo);
  // Limpiar el input para permitir seleccionar el mismo archivo otra vez
  input.value = '';
};

// INIT
// =============================================
renderHoy();
</script>
